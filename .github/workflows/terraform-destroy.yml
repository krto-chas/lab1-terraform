name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: "Write 'destroy' to run terraform destroy"
        required: true
        default: "no"

jobs:
  destroy:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm_destroy == 'destroy'
    env:
      TF_VAR_project_id: ${{ vars.TF_VAR_project_id }}
      TF_VAR_region: ${{ vars.TF_VAR_region }}
      TF_VAR_student_id: ${{ vars.TF_VAR_student_id }}
      TF_STATE_BUCKET: chas-tf-state-chas-ff
      TF_STATE_PREFIX: lab1-terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          token_format: access_token
          create_credentials_file: true
      - name: Terraform Init
        run: terraform init -backend-config="bucket=${TF_STATE_BUCKET}" -backend-config="prefix=${TF_STATE_PREFIX}" -backend-config="access_token=${{ steps.auth.outputs.access_token }}"
      - name: Terraform Destroy
        run: terraform destroy -input=false -auto-approve -no-color
