# .github/workflows/terraform.yml
name: Terraform CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform Format Check
        run: terraform fmt -check -recursive

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy IaC Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          severity: 'CRITICAL'
          exit-code: '1'

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform Init
        run: terraform init -backend=false
      - name: Terraform Validate
        run: terraform validate

  plan:
    runs-on: ubuntu-latest
    needs: [lint, security, validate]
    env:
      TF_VAR_project_id: ${{ vars.TF_VAR_project_id }}
      TF_VAR_region: ${{ vars.TF_VAR_region }}
      TF_VAR_student_id: ${{ vars.TF_VAR_student_id }}
      TF_STATE_BUCKET: chas-tf-state-chas-ff
      TF_STATE_PREFIX: lab1-terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
      - name: Prepare and activate GCP credentials
        shell: bash
        env:
          RAW_GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          set -e
          CRED_PATH="${RUNNER_TEMP}/gcp-sa-key.json"
          PEM_PATH="${RUNNER_TEMP}/gcp-sa-key.pem"
          python - <<'PY'
          import base64, json, os
          raw = os.environ['RAW_GCP_SA_KEY'].strip()
          if raw.startswith('{'):
              payload = raw
          else:
              payload = base64.b64decode(raw).decode('utf-8')
          data = json.loads(payload)
          if 'private_key' in data:
              data['private_key'] = data['private_key'].replace('\\r\\n', '\\n').replace('\\r', '\\n')
              data['private_key'] = data['private_key'].replace('\\n', '\n')
          path = os.environ['RUNNER_TEMP'] + '/gcp-sa-key.json'
          with open(path, 'w', encoding='utf-8') as f:
              json.dump(data, f)
          pem_path = os.environ['RUNNER_TEMP'] + '/gcp-sa-key.pem'
          with open(pem_path, 'w', encoding='utf-8') as f:
            f.write(data.get('private_key', ''))
          pk = data.get('private_key', '')
          print('cred_client_email=' + str(data.get('client_email', 'missing')))
          print('cred_private_key_id=' + str(data.get('private_key_id', 'missing')))
          print('cred_private_key_len=' + str(len(pk)))
          print('cred_private_key_has_begin=' + str('-----BEGIN PRIVATE KEY-----' in pk))
          print('cred_private_key_has_end=' + str('-----END PRIVATE KEY-----' in pk))
          PY
          openssl pkey -in "${PEM_PATH}" -noout
          gcloud auth activate-service-account --key-file="${CRED_PATH}"
          echo "GOOGLE_APPLICATION_CREDENTIALS=${CRED_PATH}" >> "$GITHUB_ENV"
      - name: Get backend access token
        shell: bash
        run: |
          set -e
          echo "TF_BACKEND_ACCESS_TOKEN=$(gcloud auth print-access-token)" >> "$GITHUB_ENV"
      - name: Terraform Init
        run: terraform init -backend-config="bucket=${TF_STATE_BUCKET}" -backend-config="prefix=${TF_STATE_PREFIX}" -backend-config="access_token=${TF_BACKEND_ACCESS_TOKEN}"
      - name: Terraform Plan
        run: terraform plan -input=false -no-color

  apply:
    runs-on: ubuntu-latest
    needs: [plan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      TF_VAR_project_id: ${{ vars.TF_VAR_project_id }}
      TF_VAR_region: ${{ vars.TF_VAR_region }}
      TF_VAR_student_id: ${{ vars.TF_VAR_student_id }}
      TF_STATE_BUCKET: chas-tf-state-chas-ff
      TF_STATE_PREFIX: lab1-terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
      - name: Prepare and activate GCP credentials
        shell: bash
        env:
          RAW_GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          set -e
          CRED_PATH="${RUNNER_TEMP}/gcp-sa-key.json"
          PEM_PATH="${RUNNER_TEMP}/gcp-sa-key.pem"
          python - <<'PY'
          import base64, json, os
          raw = os.environ['RAW_GCP_SA_KEY'].strip()
          if raw.startswith('{'):
              payload = raw
          else:
              payload = base64.b64decode(raw).decode('utf-8')
          data = json.loads(payload)
          if 'private_key' in data:
              data['private_key'] = data['private_key'].replace('\\r\\n', '\\n').replace('\\r', '\\n')
              data['private_key'] = data['private_key'].replace('\\n', '\n')
          path = os.environ['RUNNER_TEMP'] + '/gcp-sa-key.json'
          with open(path, 'w', encoding='utf-8') as f:
              json.dump(data, f)
          pem_path = os.environ['RUNNER_TEMP'] + '/gcp-sa-key.pem'
          with open(pem_path, 'w', encoding='utf-8') as f:
            f.write(data.get('private_key', ''))
          pk = data.get('private_key', '')
          print('cred_client_email=' + str(data.get('client_email', 'missing')))
          print('cred_private_key_id=' + str(data.get('private_key_id', 'missing')))
          print('cred_private_key_len=' + str(len(pk)))
          print('cred_private_key_has_begin=' + str('-----BEGIN PRIVATE KEY-----' in pk))
          print('cred_private_key_has_end=' + str('-----END PRIVATE KEY-----' in pk))
          PY
          openssl pkey -in "${PEM_PATH}" -noout
          gcloud auth activate-service-account --key-file="${CRED_PATH}"
          echo "GOOGLE_APPLICATION_CREDENTIALS=${CRED_PATH}" >> "$GITHUB_ENV"
      - name: Get backend access token
        shell: bash
        run: |
          set -e
          echo "TF_BACKEND_ACCESS_TOKEN=$(gcloud auth print-access-token)" >> "$GITHUB_ENV"
      - name: Terraform Init
        run: terraform init -backend-config="bucket=${TF_STATE_BUCKET}" -backend-config="prefix=${TF_STATE_PREFIX}" -backend-config="access_token=${TF_BACKEND_ACCESS_TOKEN}"
      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve -no-color