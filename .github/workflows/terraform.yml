# .github/workflows/terraform.yml
name: Terraform CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform Format Check
        run: terraform fmt -check -recursive

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy IaC Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          severity: 'CRITICAL'
          exit-code: '1'

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform Init
        run: terraform init -backend=false
      - name: Terraform Validate
        run: terraform validate

  plan:
    runs-on: ubuntu-latest
    needs: [lint, security, validate]
    env:
      TF_VAR_project_id: ${{ vars.TF_VAR_project_id }}
      TF_VAR_region: ${{ vars.TF_VAR_region }}
      TF_VAR_student_id: ${{ vars.TF_VAR_student_id }}
      TF_STATE_BUCKET: chas-tf-state-chas-ff
      TF_STATE_PREFIX: lab1-terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          create_credentials_file: true
      - name: Terraform Init
        run: terraform init -backend-config="bucket=${TF_STATE_BUCKET}" -backend-config="prefix=${TF_STATE_PREFIX}" -backend-config="credentials=${{ steps.auth.outputs.credentials_file_path }}"
      - name: Terraform Plan
        run: terraform plan -input=false -no-color

  apply:
    runs-on: ubuntu-latest
    needs: [plan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      TF_VAR_project_id: ${{ vars.TF_VAR_project_id }}
      TF_VAR_region: ${{ vars.TF_VAR_region }}
      TF_VAR_student_id: ${{ vars.TF_VAR_student_id }}
      TF_STATE_BUCKET: chas-tf-state-chas-ff
      TF_STATE_PREFIX: lab1-terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          create_credentials_file: true
      - name: Terraform Init
        run: terraform init -backend-config="bucket=${TF_STATE_BUCKET}" -backend-config="prefix=${TF_STATE_PREFIX}" -backend-config="credentials=${{ steps.auth.outputs.credentials_file_path }}"
      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve -no-color