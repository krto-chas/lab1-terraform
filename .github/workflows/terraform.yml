# .github/workflows/terraform.yml
name: Terraform CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform Format Check
        run: terraform fmt -check -recursive

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy IaC Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          severity: 'CRITICAL'
          exit-code: '1'

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform Init
        run: terraform init -backend=false
      - name: Terraform Validate
        run: terraform validate

  plan:
    runs-on: ubuntu-latest
    needs: [lint, security, validate]
    env:
      TF_VAR_project_id: ${{ vars.TF_VAR_project_id }}
      TF_VAR_region: ${{ vars.TF_VAR_region }}
      TF_VAR_student_id: ${{ vars.TF_VAR_student_id }}
      TF_STATE_BUCKET: chas-tf-state-chas-ff
      TF_STATE_PREFIX: lab1-terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Get GCP access token via OpenSSL
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          set -e
          echo "$GCP_SA_KEY" | base64 -d > /tmp/gcp-creds.json
          python3 -c "import json; open('/tmp/sa.pem','w').write(json.load(open('/tmp/gcp-creds.json'))['private_key'])"
          CLIENT_EMAIL=$(python3 -c "import json; print(json.load(open('/tmp/gcp-creds.json'))['client_email'])")

          NOW=$(date +%s)
          EXP=$((NOW + 3600))
          HEADER=$(printf '{"alg":"RS256","typ":"JWT"}' | base64 -w0 | tr '+/' '-_' | tr -d '=')
          PAYLOAD=$(printf '{"iss":"%s","sub":"%s","aud":"https://oauth2.googleapis.com/token","scope":"https://www.googleapis.com/auth/cloud-platform","iat":%d,"exp":%d}' \
            "$CLIENT_EMAIL" "$CLIENT_EMAIL" $NOW $EXP | base64 -w0 | tr '+/' '-_' | tr -d '=')
          UNSIGNED="${HEADER}.${PAYLOAD}"

          SIG=$(printf '%s' "$UNSIGNED" | openssl dgst -sha256 -sign /tmp/sa.pem | base64 -w0 | tr '+/' '-_' | tr -d '=')
          JWT="${UNSIGNED}.${SIG}"

          TOKEN=$(curl -sf -X POST https://oauth2.googleapis.com/token \
            -d "grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=${JWT}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")

          echo "GCP_ACCESS_TOKEN=${TOKEN}" >> "$GITHUB_ENV"
      - name: Terraform Init
        run: terraform init -backend-config="bucket=${TF_STATE_BUCKET}" -backend-config="prefix=${TF_STATE_PREFIX}" -backend-config="access_token=${GCP_ACCESS_TOKEN}"
      - name: Terraform Plan
        run: GOOGLE_OAUTH_ACCESS_TOKEN="$GCP_ACCESS_TOKEN" terraform plan -input=false -no-color

  apply:
    runs-on: ubuntu-latest
    needs: [plan]
    env:
      TF_VAR_project_id: ${{ vars.TF_VAR_project_id }}
      TF_VAR_region: ${{ vars.TF_VAR_region }}
      TF_VAR_student_id: ${{ vars.TF_VAR_student_id }}
      TF_STATE_BUCKET: chas-tf-state-chas-ff
      TF_STATE_PREFIX: lab1-terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Get GCP access token via OpenSSL
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          set -e
          echo "$GCP_SA_KEY" | base64 -d > /tmp/gcp-creds.json
          python3 -c "import json; open('/tmp/sa.pem','w').write(json.load(open('/tmp/gcp-creds.json'))['private_key'])"
          CLIENT_EMAIL=$(python3 -c "import json; print(json.load(open('/tmp/gcp-creds.json'))['client_email'])")

          NOW=$(date +%s)
          EXP=$((NOW + 3600))
          HEADER=$(printf '{"alg":"RS256","typ":"JWT"}' | base64 -w0 | tr '+/' '-_' | tr -d '=')
          PAYLOAD=$(printf '{"iss":"%s","sub":"%s","aud":"https://oauth2.googleapis.com/token","scope":"https://www.googleapis.com/auth/cloud-platform","iat":%d,"exp":%d}' \
            "$CLIENT_EMAIL" "$CLIENT_EMAIL" $NOW $EXP | base64 -w0 | tr '+/' '-_' | tr -d '=')
          UNSIGNED="${HEADER}.${PAYLOAD}"

          SIG=$(printf '%s' "$UNSIGNED" | openssl dgst -sha256 -sign /tmp/sa.pem | base64 -w0 | tr '+/' '-_' | tr -d '=')
          JWT="${UNSIGNED}.${SIG}"

          TOKEN=$(curl -sf -X POST https://oauth2.googleapis.com/token \
            -d "grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=${JWT}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")

          echo "GCP_ACCESS_TOKEN=${TOKEN}" >> "$GITHUB_ENV"
      - name: Terraform Init
        run: terraform init -backend-config="bucket=${TF_STATE_BUCKET}" -backend-config="prefix=${TF_STATE_PREFIX}" -backend-config="access_token=${GCP_ACCESS_TOKEN}"
      - name: Remove stale state entries
        run: |
          GOOGLE_OAUTH_ACCESS_TOKEN="$GCP_ACCESS_TOKEN" terraform state rm google_compute_disk_resource_policy_attachment.backup_attachment 2>&1 || true
          GOOGLE_OAUTH_ACCESS_TOKEN="$GCP_ACCESS_TOKEN" terraform state rm google_compute_instance.vm 2>&1 || true
          GOOGLE_OAUTH_ACCESS_TOKEN="$GCP_ACCESS_TOKEN" terraform state rm google_compute_resource_policy.daily_backup 2>&1 || true
      - name: Terraform Apply
        run: GOOGLE_OAUTH_ACCESS_TOKEN="$GCP_ACCESS_TOKEN" terraform apply -input=false -auto-approve -no-color