name: CIS Audit

on:
  workflow_dispatch:
    inputs:
      vm_name:
        description: "VM name to audit"
        required: true
      vm_zone:
        description: "VM zone"
        required: true
        default: "europe-north1-a"

jobs:
  cis-audit:
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: ${{ vars.TF_VAR_project_id }}
    steps:
      - uses: actions/checkout@v4
      - name: Prepare GCP credentials
        shell: bash
        env:
          RAW_GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          set -e
          CRED_PATH="${RUNNER_TEMP}/gcp-sa-key.json"
          python - <<'PY'
          import base64, json, os
          path = os.environ['RUNNER_TEMP'] + '/gcp-sa-key.json'
          raw = os.environ['RAW_GCP_SA_KEY'].strip()
          if raw.startswith('{'):
            payload = raw
          else:
            payload = base64.b64decode(raw).decode('utf-8')
          data = json.loads(payload)
          if 'private_key' in data and '\\n' in data['private_key']:
              data['private_key'] = data['private_key'].replace('\\n', '\n')
          if 'private_key' in data:
            data['private_key'] = data['private_key'].replace('\r\n', '\n').replace('\r', '\n')
          with open(path, 'w', encoding='utf-8') as f:
              json.dump(data, f)
          PY
          echo "GOOGLE_APPLICATION_CREDENTIALS=${CRED_PATH}" >> "$GITHUB_ENV"
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
      - name: Activate service account
        run: gcloud auth activate-service-account --key-file="${GOOGLE_APPLICATION_CREDENTIALS}"
      - name: Run Lynis CIS audit on VM
        run: |
          set -e
          gcloud config set project "${GCP_PROJECT_ID}"
          gcloud compute ssh "${{ github.event.inputs.vm_name }}" \
            --zone "${{ github.event.inputs.vm_zone }}" \
            --command "sudo apt-get update && sudo apt-get install -y lynis && sudo lynis audit system --quick --no-colors || true"
          gcloud compute ssh "${{ github.event.inputs.vm_name }}" \
            --zone "${{ github.event.inputs.vm_zone }}" \
            --command "sudo cp /var/log/lynis-report.dat /tmp/lynis-report.dat && sudo chmod 644 /tmp/lynis-report.dat"
          gcloud compute scp "${{ github.event.inputs.vm_name }}:/tmp/lynis-report.dat" ./lynis-report.dat \
            --zone "${{ github.event.inputs.vm_zone }}"
      - name: Extract hardening score
        run: |
          set -e
          SCORE=$(grep -E '^hardening_index=' lynis-report.dat | cut -d'=' -f2 || true)
          echo "Lynis hardening index: ${SCORE:-unknown}" | tee cis-summary.txt
      - name: Upload CIS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cis-audit-report
          path: |
            lynis-report.dat
            cis-summary.txt
